# Link-preview crawlers get the server-rendered Open Graph page (/p/<slug>)
# instead of the SPA shell, so shared passports unfurl with real metadata.
map $http_user_agent $is_link_crawler {
    default 0;
    "~*facebookexternalhit|twitterbot|slackbot|linkedinbot|whatsapp|telegrambot|discordbot|pinterestbot|redditbot" 1;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers (HSTS/CSP belong at the TLS-terminating proxy).
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Proxy API requests to the server container
    location /api/ {
        proxy_pass http://server:1234;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Server-rendered Open Graph pages for crawlers
    location /p/ {
        proxy_pass http://server:1234;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Locally stored uploads (avatars) served by the API server
    location /uploads/ {
        proxy_pass http://server:1234;
        proxy_set_header Host $host;
    }

    # SPA fallback - serve index.html for all non-file routes.
    # Crawlers hitting a passport URL are rewritten to the OG endpoint.
    location / {
        if ($is_link_crawler) {
            rewrite ^/profiles/(.+)$ /p/$1 last;
        }
        try_files $uri $uri/ /index.html;
    }
}
