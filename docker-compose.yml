services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: skillpass
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: server-go/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/skillpass
    command: ["./skillpass-migrate"]
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: server-go/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/skillpass
      ADMIN_EMAIL: admin@skillpass.com
      ADMIN_PASSWORD: pass123!
      APP_URL: http://localhost:4200
      JWT_SECRET: skillpass-dev-secret
    command: ["./skillpass-seed"]
    restart: "no"

  server:
    build:
      context: .
      dockerfile: server-go/Dockerfile
    ports:
      - "1234:1234"
    depends_on:
      seed:
        condition: service_completed_successfully
      markitdown:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/skillpass
      JWT_SECRET: skillpass-dev-secret
      CORS_ORIGIN: http://localhost:4200
      PORT: 1234
      APP_URL: http://localhost:4200
      UPLOAD_DIR: /app/uploads
      MARKITDOWN_URL: http://markitdown:8000
    volumes:
      - uploads:/app/uploads

  markitdown:
    build:
      context: ./markitdown-service
    expose:
      - "8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
    ports:
      - "4200:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
