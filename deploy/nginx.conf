# SkillPass Dev Server — Nginx Reverse Proxy
#
# Install on VPS host (not in container) to proxy to Docker services.
# Place at /etc/nginx/sites-available/skillpass
# Then: ln -s /etc/nginx/sites-available/skillpass /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

server {
    listen 80;
    server_name _;  # Accept any hostname / IP

    # Maximum upload size (resumes, avatars)
    client_max_body_size 20M;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Auth endpoints (rate-limited against brute force) ──
    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:1234;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API proxy ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:1234;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Open Graph pages (for link crawlers) ──────────────
    location /p/ {
        proxy_pass http://127.0.0.1:1234;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded files ────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:1234;
        proxy_set_header Host $host;
    }

    # ── Swagger docs ──────────────────────────────────────
    location /docs/ {
        proxy_pass http://127.0.0.1:1234;
        proxy_set_header Host $host;
    }

    # ── SPA — proxy everything else to the Go server ──────
    location / {
        proxy_pass http://127.0.0.1:1234;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
