pre-commit:
  commands:
    format:
      run: bun run format
      stage_fixed: true

pre-push:
  commands:
    test-server:
      # -p 1 runs packages serially: tests share one Postgres DB and truncate
      # tables for isolation, so parallel packages race each other.
      run: go -C server-go test -p 1 ./...
    test-web:
      run: ls web/src/**/*.{test,spec}.{ts,tsx} 2>/dev/null | head -1 | grep -q . && bun --cwd web test || echo "No web tests found, skipping"
    vuln-go:
      run: 'command -v govulncheck >/dev/null 2>&1 && govulncheck -C server-go ./... || echo "govulncheck not installed — run: go install golang.org/x/vuln/cmd/govulncheck@latest"'
    vuln-web:
      run: cd web && bun audit
    api-drift:
      run: bun run api:check
    no-gen-types-in-annotations:
      run: '! grep -rn "@Success.*_gen\." server-go/internal || (echo "go-jet gen types must not appear in @Success annotations — wrap them in a handler response struct" && exit 1)'
